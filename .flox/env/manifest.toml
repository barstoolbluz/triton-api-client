version = 1

[install]
python312.pkg-path = "python312"
uv.pkg-path = "uv"
gcc-unwrapped.pkg-path = "gcc-unwrapped"
zlib.pkg-path = "zlib"

[hook]
on-activate = '''
  export TRITON_OPENAI_BASE="${TRITON_OPENAI_BASE:-http://localhost:9000/v1}"
  export TRITON_API_KEY="${TRITON_API_KEY:-EMPTY}"
  export TRITON_API_BASE="${TRITON_API_BASE:-http://localhost:8000}"
  export TRITON_MODEL="${TRITON_MODEL:-}"
  export TRITON_SYSTEM_PROMPT="${TRITON_SYSTEM_PROMPT:-You are a helpful assistant.}"
  export TRITON_TOKENIZER="${TRITON_TOKENIZER:-}"
  export TRITON_GRPC_PORT="${TRITON_GRPC_PORT:-8001}"

  # numpy and grpcio need libstdc++ and libz
  export LD_LIBRARY_PATH="$FLOX_ENV/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

  VENV="$FLOX_ENV_CACHE/venv"
  if [ ! -d "$VENV" ]; then
    uv venv "$VENV" --python "$(which python3)"
  fi

  unset PYTHONPATH
  export VIRTUAL_ENV_DISABLE_PROMPT=1
  source "$VENV/bin/activate"

  if [ ! -f "$VENV/.installed-v2" ]; then
    uv pip install "tritonclient[all]" openai rich requests transformers
    touch "$VENV/.installed-v2"
  fi
'''

[profile]
common = '''
  export PATH="$FLOX_ENV_PROJECT:$FLOX_ENV_CACHE/venv/bin:$PATH"
  export VIRTUAL_ENV_DISABLE_PROMPT=1
'''
bash = '''
  unset PYTHONPATH
'''
zsh = '''
  unset PYTHONPATH
'''
