      "on-activate": "  export TRITON_API_BASE=\"${TRITON_API_BASE:-http://localhost:8000}\"\n  export TRITON_MODEL=\"${TRITON_MODEL:-}\"\n  export TRITON_SYSTEM_PROMPT=\"${TRITON_SYSTEM_PROMPT:-You are a helpful assistant.}\"\n\n  # numpy (required by tritonclient) needs libstdc++ and libz\n  export LD_LIBRARY_PATH=\"$FLOX_ENV/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}\"\n\n  VENV=\"$FLOX_ENV_CACHE/venv\"\n  if [ ! -d \"$VENV\" ]; then\n    uv venv \"$VENV\" --python \"$(which python3)\"\n  fi\n\n  unset PYTHONPATH\n  export VIRTUAL_ENV_DISABLE_PROMPT=1\n  source \"$VENV/bin/activate\"\n\n  if [ ! -f \"$VENV/.installed\" ]; then\n    uv pip install \"tritonclient[http]\" rich requests\n    touch \"$VENV/.installed\"\n  fi\n"
    },
    "profile": {
      "common": "  export PATH=\"$FLOX_ENV_PROJECT:$FLOX_ENV_CACHE/venv/bin:$PATH\"\n  export VIRTUAL_ENV_DISABLE_PROMPT=1\n",
